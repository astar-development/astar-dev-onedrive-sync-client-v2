name: Build & Test
permissions:
  pull-requests: write
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: get repository name
        run: echo "REPOSITORY_NAME=${GITHUB_REPOSITORY#*/}" >> $GITHUB_ENV

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool --version 5.*

      - name: Test
        run: |
          dotnet test --collect:"XPlat Code Coverage" --results-directory ./prcov --logger "trx"
          reportgenerator -reports:"prcov/**/coverage.cobertura.xml" -targetdir:"prcov" -reporttypes:Cobertura
